<title>Ημερολόγιο</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden}
:root{--bg:#fff;--sf:#f2f2f7;--tx:#000;--t2:#636366;--t3:#aeaeb2;--ac:#007aff;--bd:#c6c6c8;--td:#007aff}
.dark{--bg:#1c1c1e;--sf:#2c2c2e;--tx:#fff;--t2:rgba(235,235,245,.8);--t3:rgba(235,235,245,.4);--ac:#0a84ff;--bd:#38383a;--td:#0a84ff}
.app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);color:var(--tx)}
.topbar{flex:0 0 auto;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:10px 16px 8px;background:var(--bg);border-bottom:0.5px solid var(--bd);box-shadow:0 1px 8px rgba(0,0,0,.06)}
.toptitle{font-size:20px;font-weight:700;color:var(--tx);text-align:center}
.ibtn{width:30px;height:30px;border-radius:50%;border:none;background:var(--sf);color:var(--t2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.vp{display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden}
.vp.on{display:flex}
.navrow{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:6px 20px}
.navbtn{background:none;border:none;color:var(--ac);font-size:24px;cursor:pointer;padding:4px 8px;line-height:1}
.navlbl{font-size:18px;font-weight:700;color:var(--tx);letter-spacing:-0.4px}
.wdrow{flex:0 0 auto;display:grid;grid-template-columns:repeat(7,1fr);padding:1px 10px}
.wd{text-align:center;font-size:10px;font-weight:600;color:var(--t3);letter-spacing:0.5px}
.mgrid{flex:1;min-height:0;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(0,1fr);border-left:0.5px solid var(--bd);border-top:0.5px solid var(--bd);margin:0 12px 8px;overflow:hidden;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.dc{position:relative;cursor:pointer;border-right:0.5px solid var(--bd);border-bottom:0.5px solid var(--bd);overflow:hidden}
.dc:active{background:var(--sf)}
.dn{position:absolute;top:3px;left:4px;width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:400;color:var(--tx)}
.dn.tod{background:var(--td);color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(0,122,255,.5)}
.dn.om{color:var(--t3)}
.ce{position:absolute;top:26px;left:0;right:0;bottom:1px;display:flex;flex-direction:column;gap:1px;padding:0 2px;overflow:hidden}
.ea{border-radius:3px;padding:0 3px;font-size:9px;font-weight:700;line-height:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.et{padding:0 3px;font-size:9px;font-weight:600;line-height:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tabbar{flex:0 0 auto;display:flex;background:var(--bg);border-top:0.5px solid var(--bd);padding:8px 0 8px;box-shadow:0 -1px 8px rgba(0,0,0,.05)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;padding:4px 0}
.tab svg{width:22px;height:22px;stroke:var(--t3);fill:none;stroke-width:1.8}
.tab span{font-size:10px;font-weight:500;color:var(--t3)}
.tab.on svg{stroke:var(--ac)}
.tab.on span{color:var(--ac)}
.wview{flex:1;overflow-y:auto;padding:0 8px}
.whead{display:grid;grid-template-columns:40px repeat(7,1fr);border-bottom:1px solid var(--bd);padding-bottom:4px}
.whday{text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px}
.whdn{font-size:11px;color:var(--t3);font-weight:500}
.whdd{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:var(--tx)}
.whdd.tod{background:var(--td);color:#fff}
.tgrid{display:grid;grid-template-columns:40px repeat(7,1fr)}
.tglbl{font-size:10px;color:var(--t3);text-align:right;padding-right:6px;height:44px;display:flex;align-items:flex-start;margin-top:-6px}
.tcol{border-left:1px solid var(--bd);position:relative;min-height:44px;height:44px}
.wev{position:absolute;left:1px;right:1px;border-radius:4px;padding:2px 4px;font-size:9px;font-weight:600;overflow:hidden;top:3px;height:38px}
.dview{flex:1;overflow-y:auto;padding:0 8px}
.dtrow{display:grid;grid-template-columns:40px 1fr;border-bottom:1px solid var(--bd)}
.dtl{font-size:10px;color:var(--t3);text-align:right;padding-right:6px;padding-top:4px;height:44px}
.deb{border-radius:8px;margin:2px 4px;padding:5px 9px;cursor:pointer}
.deb:active{opacity:.7}
.det{font-size:13px;font-weight:600}
.dem{font-size:11px;opacity:.8;margin-top:1px}
.den{font-size:11px;opacity:.7;margin-top:2px;font-style:italic;white-space:pre-line;line-height:1.5}
.yview{flex:1;overflow-y:auto;padding:6px 8px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ym{background:var(--sf);border-radius:12px;padding:8px}
.ymt{font-size:11px;font-weight:700;color:var(--tx);text-align:center;margin-bottom:4px}
.ymg{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.ymwd{font-size:7px;color:var(--t3);text-align:center}
.ymd{font-size:8px;color:var(--tx);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin:auto;position:relative}
.ymd.tod{background:var(--td);color:#fff;font-weight:700}
.ymd.om{color:var(--t3)}
.ymd.hev::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--ac)}
.ymd.tod.hev::after{background:#fff}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end}
.sheet{background:var(--sf);border-radius:20px 20px 0 0;width:100%;padding:10px 14px 16px;max-height:96vh;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.sheet.sm{max-height:55vh}
.handle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 8px}
.stitle{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:8px}
.fg{margin-bottom:7px}
.fl{font-size:11px;color:var(--t2);margin-bottom:4px;display:block}
.fi{width:100%;padding:7px 10px;border-radius:10px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:14px;outline:none;font-family:inherit}
.trow{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(--bg);border-radius:10px;border:1px solid var(--bd)}
.tlbl{font-size:14px;color:var(--tx)}
.tog{position:relative;width:40px;height:22px;cursor:pointer}
.tog input{opacity:0;width:0;height:0}
.tok{position:absolute;inset:0;background:var(--bd);border-radius:11px;transition:background .2s}
.tog input:checked+.tok{background:var(--ac)}
.tth{position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog input:checked~.tth{transform:translateX(18px)}
.tgrp2{display:grid;grid-template-columns:0.45fr 0.48fr;gap:40px;width:100%}
.mbtns{display:flex;gap:8px;margin-top:8px}
.bcanc{flex:1;padding:9px;border-radius:12px;border:1px solid var(--bd);background:none;color:var(--t2);font-size:14px;cursor:pointer;font-family:inherit}
.bsave{flex:2;padding:9px;border-radius:12px;border:none;background:var(--ac);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.hidden{display:none!important}
.ctabs{display:flex;gap:5px;margin-bottom:8px}
.ctab{flex:1;padding:6px;border-radius:9px;border:1px solid var(--bd);background:none;color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit}
.ctab.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.cgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}
.csw{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s}
.csw.on{border-color:var(--tx);transform:scale(1.2)}
.crow{display:flex;gap:8px;align-items:center;margin-top:6px}
.cprev{width:28px;height:28px;border-radius:50%;border:1px solid var(--bd);flex-shrink:0}
.chex{flex:1;min-width:0;padding:6px 8px;border-radius:10px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:13px;outline:none;font-family:monospace}
.cbtn{padding:6px 10px;border-radius:10px;border:none;background:var(--ac);color:#fff;font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0}
.tsec{margin-bottom:7px}
.tlist{display:flex;flex-direction:column;gap:4px;max-height:70px;overflow-y:auto}
.ti{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg);border-radius:12px;border:1px solid var(--bd);cursor:pointer}
.ti:active{transform:scale(.97)}
.tdot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.tname{font-size:13px;font-weight:500;color:var(--tx);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tdel{font-size:16px;color:var(--t3);cursor:pointer;padding:2px 4px;flex-shrink:0}
.tsrow{display:flex;gap:8px;margin-top:5px}
.tsbtn{padding:6px 12px;border-radius:10px;border:1px solid var(--ac);background:none;color:var(--ac);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}
.rrow{display:flex;gap:4px}
.rb{flex:1;padding:6px 2px;border-radius:10px;border:1px solid var(--bd);background:var(--bg);color:var(--t2);font-size:11px;cursor:pointer;font-family:inherit;text-align:center}
.rb.on{background:var(--ac);color:#fff;border-color:var(--ac);font-weight:600}
.rbadge{font-size:9px;color:#fff;border-radius:4px;padding:1px 4px;margin-left:4px;vertical-align:middle}
.dev{display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd);cursor:pointer;user-select:none;-webkit-user-select:none}
.dev:last-child{border-bottom:none}
.dev.dragging{opacity:.4}
.dev.dragover{background:rgba(0,102,255,.07);border-radius:8px}
.dhandle{font-size:18px;color:var(--t3);padding:0 4px;flex-shrink:0;touch-action:none}
.dbar{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:36px}
.dtitle{font-size:15px;font-weight:600;color:var(--tx)}
.dtime{font-size:13px;color:var(--t3);margin-top:2px}
.dnote{font-size:13px;color:var(--t2);margin-top:4px;font-style:italic;white-space:pre-line;line-height:1.5}
.dempty{font-size:14px;color:var(--t3);text-align:center;padding:20px 0}
.dadd{width:100%;margin-top:12px;padding:11px;border-radius:12px;border:none;background:var(--ac);color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.atitle{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:3px}
.asub{font-size:13px;color:var(--t3);margin-bottom:14px}
.abtn{width:100%;padding:12px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px;font-family:inherit;text-align:left}
.aedit{background:var(--bg);color:var(--ac);border:1px solid var(--bd)}
.adel{background:rgba(255,59,48,.07);color:#ff3b30;border:1px solid rgba(255,59,48,.2)}
.acanc{background:var(--bg);color:var(--t2);border:1px solid var(--bd);margin-bottom:0}
.bbtn{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--bd);font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px;font-family:inherit;text-align:left;display:flex;align-items:center;gap:12px;background:var(--bg)}
.bexp{color:var(--ac)}.bimp{color:#1db954}.bcnc{color:var(--t2);margin-bottom:0}
@keyframes slL{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes slR{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}
.mgrid.al{animation:slL .25s ease}
.mgrid.ar{animation:slR .25s ease}
.tab:active{transform:scale(.86)}
.navbtn:active{opacity:.5}


.tpl-scroll{display:flex;gap:8px;overflow-x:auto;padding:2px 0 8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tpl-scroll::-webkit-scrollbar{display:none}
.tpl-card{flex-shrink:0;width:100px;border-radius:12px;padding:10px;cursor:pointer;display:flex;flex-direction:column;gap:6px;border:1.5px solid transparent;transition:transform .15s,border-color .15s;position:relative}
.tpl-card:active{transform:scale(.95)}
.tpl-card.sel{border-color:var(--ac)}
.tpl-card-dot{width:18px;height:18px;border-radius:50%;margin-bottom:2px}
.tpl-card-name{font-size:12px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tpl-card-del{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.15);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.tpl-empty{font-size:13px;color:var(--t3);padding:4px 0}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center">
      <button onclick="goToday()" style="all:unset;cursor:pointer;display:flex;align-items:center">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="4" width="20" height="18" rx="3" fill="var(--ac)" opacity="0.15"/>
          <rect x="2" y="4" width="20" height="18" rx="3" stroke="var(--ac)" stroke-width="1.5"/>
          <rect x="2" y="4" width="20" height="7" rx="3" fill="var(--ac)"/>
          <rect x="2" y="8" width="20" height="3" fill="var(--ac)"/>
          <line x1="8" y1="2" x2="8" y2="7" stroke="var(--ac)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="16" y1="2" x2="16" y2="7" stroke="var(--ac)" stroke-width="1.5" stroke-linecap="round"/>
          <text id="tdn" x="12" y="20" text-anchor="middle" font-size="8" font-weight="700" fill="var(--ac)" font-family="-apple-system,sans-serif"></text>
        </svg>
      </button>
    </div>
    <span class="toptitle">Ημερολόγιο</span>
    <div style="display:flex;justify-content:flex-end;gap:8px;align-items:center">
      <button class="ibtn" onclick="openBk()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="ibtn" onclick="togTheme()" id="thbtn">🌙</button>
    </div>
  </div>

  <div class="vp on" id="vp-month">
    <div class="navrow">
      <button class="navbtn" onclick="chMonth(-1)">&#8249;</button>
      <span class="navlbl" id="mlbl"></span>
      <button class="navbtn" onclick="chMonth(1)">&#8250;</button>
    </div>
    <div class="wdrow" id="wdrow"></div>
    <div class="mgrid" id="mgrid"></div>
  </div>

  <div class="vp" id="vp-week">
    <div class="navrow">
      <button class="navbtn" onclick="chWeek(-1)">&#8249;</button>
      <span class="navlbl" id="wlbl"></span>
      <button class="navbtn" onclick="chWeek(1)">&#8250;</button>
    </div>
    <div class="wview" id="wview"></div>
  </div>

  <div class="vp" id="vp-day">
    <div class="navrow">
      <button class="navbtn" onclick="chDay(-1)">&#8249;</button>
      <span class="navlbl" id="dlbl"></span>
      <button class="navbtn" onclick="chDay(1)">&#8250;</button>
    </div>
    <div class="dview" id="dview"></div>
  </div>

  <div class="vp" id="vp-year">
    <div class="navrow">
      <button class="navbtn" onclick="chYear(-1)">&#8249;</button>
      <span class="navlbl" id="ylbl"></span>
      <button class="navbtn" onclick="chYear(1)">&#8250;</button>
    </div>
    <div class="yview" id="yview"></div>
  </div>

  <div class="tabbar">
    <button class="tab on" id="tab-month" onclick="swView('month')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="4" x2="8" y2="9"/><line x1="16" y1="4" x2="16" y2="9"/><line x1="7" y1="14" x2="9" y2="14"/><line x1="11" y1="14" x2="13" y2="14"/><line x1="15" y1="14" x2="17" y2="14"/><line x1="7" y1="18" x2="9" y2="18"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      <span>Μήνας</span>
    </button>
    <button class="tab" id="tab-week" onclick="swView('week')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="4" x2="8" y2="9"/><line x1="16" y1="4" x2="16" y2="9"/><line x1="8" y1="9" x2="8" y2="22"/><line x1="16" y1="9" x2="16" y2="22"/></svg>
      <span>Εβδομάδα</span>
    </button>
    <button class="tab" id="tab-day" onclick="swView('day')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="4" x2="8" y2="9"/><line x1="16" y1="4" x2="16" y2="9"/><line x1="7" y1="14" x2="17" y2="14"/><line x1="7" y1="18" x2="13" y2="18"/></svg>
      <span>Ημέρα</span>
    </button>
    <button class="tab" id="tab-year" onclick="swView('year')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="4" x2="8" y2="9"/><line x1="16" y1="4" x2="16" y2="9"/><line x1="3" y1="14" x2="21" y2="14"/><line x1="3" y1="19" x2="21" y2="19"/></svg>
      <span>Έτος</span>
    </button>
  </div>

  <div class="ov hidden" id="ov-det" onclick="if(event.target===this)closeDet()">
    <div class="sheet">
      <div class="handle"></div>
      <div class="stitle" id="det-d"></div>
      <div id="det-l"></div>
      <button class="dadd" onclick="openAdd()">
        <svg width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="2"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
        Νέο γεγονός
      </button>
    </div>
  </div>

  <div class="ov hidden" id="ov-add" onclick="if(event.target===this)closeAdd()">
    <div class="sheet">
      <div class="handle"></div>
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px">
        <span class="stitle" id="add-ttl" style="margin-bottom:0">Νέο γεγονός</span>
        <span id="add-dt" style="font-size:11px;color:var(--t3);font-weight:500"></span>
      </div>
      <div class="tsec" id="tsec">
        <div class="fl" style="font-weight:600;margin-bottom:4px">Πρότυπα</div>
        <div class="tpl-scroll" id="tpl-scroll"></div>
        <div class="tsrow"><button class="tsbtn" onclick="saveTpl()">💾 Αποθήκευση ως πρότυπο</button></div>
      </div>
      <div class="fg"><label class="fl">Τίτλος</label><input class="fi" id="ev-t" placeholder="Τίτλος γεγονότος..."/></div>
      <div class="fg"><div class="trow"><span class="tlbl">Ολοήμερο</span><label class="tog"><input type="checkbox" id="ev-a" onchange="togAD()"/><div class="tok"></div><div class="tth"></div></label></div></div>
      <div class="fg tgrp2" id="tgrp">
        <div><label class="fl">Ώρα έναρξης</label><input class="fi" type="time" id="ev-ts"/></div>
        <div><label class="fl">Ώρα λήξης</label><input class="fi" type="time" id="ev-te"/></div>
      </div>
      <div class="fg">
        <label class="fl">Χρώμα</label>
        <div class="ctabs">
          <button class="ctab on" id="ct-b" onclick="sCTab('b')">Βασικά</button>
          <button class="ctab" id="ct-s" onclick="sCTab('s')">Αποχρώσεις</button>
          <button class="ctab" id="ct-c" onclick="sCTab('c')">Κωδικός</button>
        </div>
        <div id="cp-b"><div class="cgrid" id="cg-b"></div></div>
        <div id="cp-s" class="hidden"><div class="cgrid" id="cg-s"></div></div>
        <div id="cp-c" class="hidden">
          <div class="crow">
            <div class="cprev" id="cprev"></div>
            <input class="chex" id="chex" placeholder="#007aff" maxlength="7"/>
            <button class="cbtn" onclick="aHex()">OK</button>
            <button class="cbtn" style="background:var(--sf);color:var(--t2);border:1px solid var(--bd)" onclick="sHex()">+</button>
          </div>
          <div class="cgrid" id="cg-c" style="margin-top:8px"></div>
        </div>
      </div>
      <div class="fg"><label class="fl">Σημειώσεις</label><textarea class="fi" id="ev-n" rows="2" style="resize:none" placeholder="Προσθήκη σημείωσης..."></textarea></div>
      <div class="fg">
        <label class="fl">Επανάληψη</label>
        <div class="rrow">
          <button class="rb on" id="rb-none" onclick="sRep('none')">Καμία</button>
          <button class="rb" id="rb-weekly" onclick="sRep('weekly')">Εβδ.</button>
          <button class="rb" id="rb-monthly" onclick="sRep('monthly')">Μην.</button>
          <button class="rb" id="rb-yearly" onclick="sRep('yearly')">Ετήσ.</button>
        </div>
      </div>
      <div class="mbtns">
        <button class="bcanc" onclick="closeAdd()">Ακύρωση</button>
        <button class="bsave" onclick="saveEv()">Αποθήκευση</button>
      </div>
    </div>
  </div>

  <div class="ov hidden" id="ov-act" onclick="if(event.target===this)closeAct()">
    <div class="sheet sm">
      <div class="handle"></div>
      <div class="atitle" id="act-t"></div>
      <div class="asub" id="act-s"></div>
      <button class="abtn aedit" onclick="editEv()">✏️ Επεξεργασία</button>
      <button class="abtn adel" onclick="delEv()">🗑 Διαγραφή</button>
      <button class="abtn acanc" onclick="closeAct()">Ακύρωση</button>
    </div>
  </div>

  <div class="ov hidden" id="ov-bk" onclick="if(event.target===this)closeBk()">
    <div class="sheet sm">
      <div class="handle"></div>
      <div class="stitle">Αντίγραφο ασφαλείας</div>
      <button class="bbtn bexp" onclick="expData()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Εξαγωγή δεδομένων (.json)
      </button>
      <button class="bbtn bimp" onclick="document.getElementById('imp-f').click()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Εισαγωγή δεδομένων (.json)
      </button>
      <input type="file" id="imp-f" accept=".json" style="display:none" onchange="impData(event)"/>
      <button class="bbtn bcnc" onclick="closeBk()">Ακύρωση</button>
    </div>
  </div>
</div>
<script>

var BC=['#0066ff','#1db954','#ff8000','#ff2020','#9b30ff','#ff1a44','#00b4d8','#f5c800','#00a8a0','#e0007a','#111111','#636366'];
var SC=['#b3d4ff','#80b8ff','#4d9cff','#1a80ff','#0066ff','#004ecc','#003899','#002166','#b3eac7','#80d6a2','#4dc27d','#1aae58','#1db954','#178f42','#116630','#0b3d1e','#ffd599','#ffbb55','#ffa011','#ff8800','#ff8000','#cc6600','#994d00','#663300','#ffaaaa','#ff7777','#ff4444','#ff1111','#ff2020','#cc0000','#990000','#660000','#d4aaff','#bb77ff','#a244ff','#8811ff','#9b30ff','#7a00e6','#5c00b3','#3d0080','#ff99bb','#ff5588','#ff2255','#ff0033','#ff1a44','#cc0033','#990022','#660011'];
var MG=['Ιανουάριος','Φεβρουάριος','Μάρτιος','Απρίλιος','Μάιος','Ιούνιος','Ιούλιος','Αύγουστος','Σεπτέμβριος','Οκτώβριος','Νοέμβριος','Δεκέμβριος'];
var MS=['Ιαν','Φεβ','Μαρ','Απρ','Μαϊ','Ιουν','Ιουλ','Αυγ','Σεπ','Οκτ','Νοε','Δεκ'];
var DG=['Δευ','Τρι','Τετ','Πεμ','Παρ','Σαβ','Κυρ'];
var DF=['Κυριακή','Δευτέρα','Τρίτη','Τετάρτη','Πέμπτη','Παρασκευή','Σάββατο'];
function jm(d){return(d+6)%7;}
function dk(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd;}
function fmtD(d){var dd=String(d.getDate()).padStart(2,'0'),mm=String(d.getMonth()+1).padStart(2,'0'),yy=d.getFullYear();return DF[d.getDay()]+' '+dd+'/'+mm+'/'+yy;}
var today=new Date();today.setHours(0,0,0,0);
var cur=new Date(today),sel=new Date(today),view='month',dark=false,selC=BC[0],selRep='none',editId=null,actId=null,CC=[];
var evs=[],tpls=[];
try{evs=JSON.parse(localStorage.getItem('cal_evs3')||'[]')}catch(e){}
try{tpls=JSON.parse(localStorage.getItem('cal_tpls')||'[]')}catch(e){}
try{CC=JSON.parse(localStorage.getItem('cal_cc')||'[]')}catch(e){}
function sE(){try{localStorage.setItem('cal_evs3',JSON.stringify(evs))}catch(e){}}
function sT(){try{localStorage.setItem('cal_tpls',JSON.stringify(tpls))}catch(e){}}
function efd(d){
  var ds=dk(d);
  return evs.filter(function(e){
    if(e.date===ds)return true;
    if(!e.rep||e.rep==='none')return false;
    var o=new Date(e.date+'T00:00:00');
    if(d<=o)return false;
    if(e.rep==='weekly'){var dd=Math.round((d-o)/86400000);return d.getDay()===o.getDay()&&dd%7===0;}
    if(e.rep==='monthly')return d.getDate()===o.getDate()&&(d.getFullYear()>o.getFullYear()||d.getMonth()>o.getMonth());
    if(e.rep==='yearly')return d.getDate()===o.getDate()&&d.getMonth()===o.getMonth()&&d.getFullYear()>o.getFullYear();
    return false;
  });
}
function refT(){
  var n=new Date();n.setHours(0,0,0,0);
  if(dk(n)!==dk(today)){
    today=n;
    var el=document.getElementById('tdn');if(el)el.textContent=today.getDate();
    if(view==='month')rM();else if(view==='week')rW();else if(view==='day')rD();else rY();
  }
}
function togTheme(){
  dark=!dark;
  document.getElementById('app').classList.toggle('dark',dark);
  document.getElementById('thbtn').textContent=dark?'☀️':'🌙';
  document.getElementById('theme-color-meta').content=dark?'#1c1c1e':'#fff';
}
function swView(v){
  view=v;
  ['month','week','day','year'].forEach(function(n){
    document.getElementById('vp-'+n).classList.toggle('on',n===v);
    document.getElementById('tab-'+n).classList.toggle('on',n===v);
  });
  if(v==='month')rM();
  else if(v==='week'){cur=new Date(today);rW();}
  else if(v==='day')rD();
  else rY();
}
function goToday(){cur=new Date(today);sel=new Date(today);if(view==='month')rM();else if(view==='week')rW();else if(view==='day')rD();else rY();}
function ag(d){var g=document.getElementById('mgrid');if(!g)return;g.classList.remove('al','ar');void g.offsetWidth;g.classList.add(d);}
function chMonth(d){cur.setMonth(cur.getMonth()+d);ag(d>0?'al':'ar');rM();}
function chWeek(d){cur.setDate(cur.getDate()+d*7);rW();}
function chDay(d){cur.setDate(cur.getDate()+d);sel=new Date(cur);rD();}
function chYear(d){cur.setFullYear(cur.getFullYear()+d);rY();}
function rM(){
  var y=cur.getFullYear(),m=cur.getMonth();
  document.getElementById('mlbl').textContent=MG[m]+' '+y;
  document.getElementById('wdrow').innerHTML=DG.map(function(d){return'<div class="wd">'+d+'</div>';}).join('');
  var fc=jm(new Date(y,m,1).getDay()),dim=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
  var c='';
  for(var i=0;i<fc;i++){var pD=prev-fc+i+1,pM=m===0?11:m-1,pY=m===0?y-1:y;var pE=efd(new Date(pY,pM,pD)),pI=pE.slice(0,4).map(function(e){return(e.allday||(e.rep&&e.rep!=='none'))?'<div class="ea" style="background:'+e.color+';color:#fff;opacity:.55">'+e.title+'</div>':'<div class="et" style="color:'+e.color+';opacity:.55">'+e.title+'</div>';}).join('');c+='<div class="dc" onclick="openDet('+pY+','+pM+','+pD+')"><div class="dn om">'+pD+'</div><div class="ce">'+pI+'</div></div>';}
  for(var d=1;d<=dim;d++){
    var dt=new Date(y,m,d),isT=dk(dt)===dk(today);
    var de=efd(dt);
    var ad=de.filter(function(e){return e.allday||(e.rep&&e.rep!=='none');});
    var td=de.filter(function(e){return !e.allday&&(!e.rep||e.rep==='none');});
    var sh=ad.concat(td).slice(0,6);
    var inn=sh.map(function(e){
      return(e.allday||(e.rep&&e.rep!=='none'))?'<div class="ea" style="background:'+e.color+';color:#fff">'+e.title+'</div>':'<div class="et" style="color:'+e.color+'">'+e.title+'</div>';
    }).join('');
    c+='<div class="dc" onclick="openDet('+y+','+m+','+d+')"><div class="dn'+(isT?' tod':'')+'">'+d+'</div><div class="ce">'+inn+'</div></div>';
  }
  var tail=(fc+dim)%7,tr=tail===0?0:7-tail;
  for(var d=1;d<=tr;d++){var nM=m===11?0:m+1,nY=m===11?y+1:y;var nE=efd(new Date(nY,nM,d)),nI=nE.slice(0,4).map(function(e){return(e.allday||(e.rep&&e.rep!=='none'))?'<div class="ea" style="background:'+e.color+';color:#fff;opacity:.55">'+e.title+'</div>':'<div class="et" style="color:'+e.color+';opacity:.55">'+e.title+'</div>';}).join('');c+='<div class="dc" onclick="openDet('+nY+','+nM+','+d+')"><div class="dn om">'+d+'</div><div class="ce">'+nI+'</div></div>';}
  document.getElementById('mgrid').innerHTML=c;
}
function openDet(y,m,d){
  sel=new Date(y,m,d);cur=new Date(y,m,d);
  document.getElementById('det-d').textContent=fmtD(sel);
  rDL();
  document.getElementById('ov-det').classList.remove('hidden');
  rM();
}

// Premium month swipe
(function(){
  var vp=document.getElementById('vp-month');

  function gr(){return document.getElementById('mgrid');}
  vp.addEventListener('touchstart',function(e){if(view!=='month')return;sx=e.touches[0].clientX;sy=e.touches[0].clientY;cx=sx;drag=false;axis=null;W=window.innerWidth;var g=gr();if(g)g.style.transition='none';},{passive:true});
  vp.addEventListener('touchmove',function(e){if(view!=='month')return;var dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;if(!axis&&(Math.abs(dx)>6||Math.abs(dy)>6))axis=Math.abs(dx)>Math.abs(dy)?'x':'y';if(axis!=='x')return;drag=true;cx=e.touches[0].clientX;var g=gr();if(!g)return;var raw=(cx-sx)/W*100,sign=raw<0?-1:1,ab=Math.abs(raw);var cl=ab<35?ab:35+Math.sqrt(ab-35)*1.5;cl=Math.min(cl,50)*sign;g.style.transform='translateX('+cl+'%) scale('+(1-Math.abs(cl)/400)+')';g.style.opacity=''+(1-Math.abs(cl)/120);},{passive:true});
  vp.addEventListener('touchend',function(){if(view!=='month'||!drag){axis=null;return;}var dx=cx-sx,g=gr(),thr=W*0.22;drag=false;axis=null;if(Math.abs(dx)>thr){var dir=dx<0?-1:1;if(g){g.style.transition='transform .26s cubic-bezier(.4,0,.6,1),opacity .26s';g.style.transform='translateX('+(dir>0?'105':'-105')+'%) scale(.96)';g.style.opacity='0';}setTimeout(function(){if(g){g.style.transition='none';g.style.transform='translateX('+(dir>0?'-30':'30')+'%) scale(.96)';g.style.opacity='0';}chMonth(-dir);requestAnimationFrame(function(){requestAnimationFrame(function(){if(g){g.style.transition='transform .32s cubic-bezier(.22,1,.36,1),opacity .28s';g.style.transform='';g.style.opacity='';}});});},240);}else{if(g){g.style.transition='transform .38s cubic-bezier(.22,1,.36,1),opacity .3s';g.style.transform='';g.style.opacity='';}}},{passive:true});
})();
// Swipe down to close sheets
(function(){
  function swipeClose(ovId,closeFn){

    var sy=0,cy=0,drag=false,sh=null;

    ov.addEventListener('touchmove',function(e){if(!sh)return;cy=e.touches[0].clientY;var dy=cy-sy;if(dy<=0)return;drag=true;var r=dy>80?80+Math.sqrt(dy-80)*2:dy;sh.style.transform='translateY('+r+'px)';sh.style.opacity=''+(1-r/280);},{passive:true});
    ov.addEventListener('touchend',function(){if(!sh||!drag){drag=false;return;}var dy=cy-sy;drag=false;if(dy>90){sh.style.transition='transform .28s cubic-bezier(.4,0,1,1),opacity .25s';sh.style.transform='translateY(110%)';sh.style.opacity='0';setTimeout(function(){closeFn();sh.style.transition='';sh.style.transform='';sh.style.opacity='';},270);}else{sh.style.transition='transform .35s cubic-bezier(.22,1,.36,1),opacity .3s';sh.style.transform='';sh.style.opacity='';}},{passive:true});
